AWSTemplateFormatVersion: '2010-09-09'
Description: >
  ShopAssist E-Commerce Agent — One-Click Deployment
  Deploys: DynamoDB tables, Lambda tools, AgentCore Gateway + Targets, AgentCore Runtime

Parameters:
  ModelId:
    Type: String
    Default: openai.gpt-oss-120b
    Description: Bedrock model ID for the agent

  AgentCodeS3Bucket:
    Type: String
    Default: ''
    Description: S3 bucket containing the agent code package (zip). Leave empty if using toolkit deploy.

  AgentCodeS3Key:
    Type: String
    Default: shopassist-agent/agent.zip
    Description: S3 key for the agent code zip package

Conditions:
  DeployRuntime: !Not [!Equals [!Ref AgentCodeS3Bucket, '']]

Resources:
  # ═══════════════════════════════════════════════════════════════════════════════
  # DATA LAYER — DynamoDB Tables
  # ═══════════════════════════════════════════════════════════════════════════════

  ProductsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-Products
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: category
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: category-index
          KeySchema:
            - AttributeName: category
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  CartsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-Carts
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: customer_id
          AttributeType: S
      KeySchema:
        - AttributeName: customer_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-Orders
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: order_id
          AttributeType: S
        - AttributeName: customer_id
          AttributeType: S
      KeySchema:
        - AttributeName: order_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: customer-index
          KeySchema:
            - AttributeName: customer_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # ═══════════════════════════════════════════════════════════════════════════════
  # TOOL LAYER — Lambda Functions (Gateway Targets)
  # ═══════════════════════════════════════════════════════════════════════════════

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-LambdaRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:BatchWriteItem
                Resource:
                  - !GetAtt ProductsTable.Arn
                  - !Sub ${ProductsTable.Arn}/index/*
                  - !GetAtt CartsTable.Arn
                  - !GetAtt OrdersTable.Arn
                  - !Sub ${OrdersTable.Arn}/index/*

  ProductsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-Products
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        ZipFile: |
          import json
          PRODUCTS = [
              {"id": "ELEC-001", "name": "SoundWave Pro Wireless Headphones", "category": "Electronics", "price": 79.99, "rating": 4.5, "reviews": 2847, "description": "Premium wireless headphones with ANC, 30-hour battery.", "in_stock": True},
              {"id": "ELEC-002", "name": "BassBoost Studio Over-Ear Headphones", "category": "Electronics", "price": 149.99, "rating": 4.7, "reviews": 1523, "description": "Audiophile-grade over-ear headphones with 50mm drivers.", "in_stock": True},
              {"id": "ELEC-003", "name": "AirBud Mini Earbuds", "category": "Electronics", "price": 49.99, "rating": 4.2, "reviews": 5621, "description": "Compact true wireless earbuds, IPX5 waterproof.", "in_stock": True},
              {"id": "ELEC-005", "name": "RunnerX Sport Earbuds", "category": "Electronics", "price": 69.99, "rating": 4.4, "reviews": 3156, "description": "Sport earbuds with bone conduction, IP67.", "in_stock": True},
              {"id": "ELEC-006", "name": "UltraBook Pro 15 Laptop", "category": "Electronics", "price": 1299.99, "rating": 4.6, "reviews": 1834, "description": "15-inch 4K OLED, Intel i7, 32GB RAM.", "in_stock": True},
              {"id": "HOME-001", "name": "BrewMaster Elite Coffee Maker", "category": "Home & Kitchen", "price": 189.99, "rating": 4.7, "reviews": 3456, "description": "12-cup programmable with built-in grinder.", "in_stock": True},
              {"id": "HOME-003", "name": "CrispAir Digital Air Fryer", "category": "Home & Kitchen", "price": 99.99, "rating": 4.6, "reviews": 7234, "description": "5.8-quart digital air fryer with 8 presets.", "in_stock": True},
              {"id": "SPRT-001", "name": "CloudRun Ultra Running Shoes", "category": "Sports & Outdoors", "price": 139.99, "rating": 4.6, "reviews": 4523, "description": "Lightweight with carbon plate for energy return.", "in_stock": True},
              {"id": "SPRT-002", "name": "ZenFlow Premium Yoga Mat", "category": "Sports & Outdoors", "price": 49.99, "rating": 4.7, "reviews": 6789, "description": "6mm thick, non-slip natural rubber.", "in_stock": True},
              {"id": "BOOK-001", "name": "Building AI Agents", "category": "Books", "price": 44.99, "rating": 4.7, "reviews": 567, "description": "Comprehensive guide to building AI agents.", "in_stock": True},
              {"id": "BOOK-005", "name": "Project Hail Mary", "category": "Books", "price": 16.99, "rating": 4.8, "reviews": 67890, "description": "A lone astronaut must save Earth.", "in_stock": True},
              {"id": "BOOK-006", "name": "Atomic Habits", "category": "Books", "price": 18.99, "rating": 4.7, "reviews": 89012, "description": "Build good habits & break bad ones.", "in_stock": True},
          ]
          def handler(event, context):
              # Gateway passes only the tool arguments as event (flat dict)
              # Infer tool from argument keys
              if "product_id" in event and "category" not in event and "query" not in event:
                  pid = event["product_id"]
                  for p in PRODUCTS:
                      if p["id"] == pid: return {"product": p}
                  return {"error": f"Product '{pid}' not found"}
              elif "query" in event or "min_price" in event or "max_price" in event or "category" in event:
                  query = (event.get("query") or "").lower()
                  category = event.get("category", "")
                  max_price = float(event.get("max_price", 99999))
                  min_price = float(event.get("min_price", 0))
                  results = [p for p in PRODUCTS if (not category or p["category"].lower() == category.lower()) and min_price <= p["price"] <= max_price and (not query or any(w in f"{p['name']} {p['description']} {p['category']}".lower() for w in query.split()))]
                  return {"products": results[:10], "total": len(results)}
              else:
                  # get_recommendations (limit, category, or empty)
                  category = event.get("category", "")
                  limit = int(event.get("limit", 5))
                  pool = PRODUCTS if not category else [p for p in PRODUCTS if p["category"].lower() == category.lower()]
                  pool.sort(key=lambda x: (-x["rating"], -x["reviews"]))
                  return {"recommendations": pool[:limit]}
      Environment:
        Variables:
          PRODUCTS_TABLE: !Ref ProductsTable

  CartFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-Cart
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        ZipFile: |
          import json
          carts = {}
          applied_coupons = {}
          COUPONS = {"WELCOME10": {"discount_percent": 10, "min_order": 0}, "SAVE20": {"discount_percent": 20, "min_order": 100}, "SPRING25": {"discount_percent": 25, "min_order": 75}, "TECH15": {"discount_percent": 15, "min_order": 200}}
          def handler(event, context):
              # Gateway passes only tool arguments as event
              # Infer tool: add_to_cart has product_id+customer_id, view_cart has only customer_id,
              # remove_from_cart has customer_id+product_id (no quantity), apply_coupon has coupon_code
              if "coupon_code" in event:
                  cid, code = event["customer_id"], event["coupon_code"].upper()
                  if code not in COUPONS: return {"status": "invalid", "code": code}
                  applied_coupons[cid] = code
                  return {"status": "applied", "code": code, "details": COUPONS[code]}
              elif "product_id" in event and "quantity" in event:
                  cid, pid, qty = event["customer_id"], event["product_id"], int(event.get("quantity", 1))
                  if cid not in carts: carts[cid] = []
                  for item in carts[cid]:
                      if item["product_id"] == pid:
                          item["quantity"] += qty
                          return {"status": "updated", "product_id": pid, "quantity": item["quantity"]}
                  carts[cid].append({"product_id": pid, "quantity": qty})
                  return {"status": "added", "product_id": pid, "quantity": qty}
              elif "product_id" in event:
                  # Could be add_to_cart (no quantity specified) or remove_from_cart
                  # Default to add if no other signal
                  cid, pid = event["customer_id"], event["product_id"]
                  if cid in carts and any(i["product_id"] == pid for i in carts.get(cid, [])):
                      carts[cid] = [i for i in carts[cid] if i["product_id"] != pid]
                      return {"status": "removed", "product_id": pid}
                  else:
                      if cid not in carts: carts[cid] = []
                      carts[cid].append({"product_id": pid, "quantity": 1})
                      return {"status": "added", "product_id": pid, "quantity": 1}
              else:
                  # view_cart — only customer_id
                  cid = event.get("customer_id", "")
                  return {"items": carts.get(cid, []), "applied_coupon": applied_coupons.get(cid)}
      Environment:
        Variables:
          CARTS_TABLE: !Ref CartsTable

  OrdersFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-Orders
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        ZipFile: |
          import json, uuid
          from datetime import datetime, timedelta
          orders = {"ORD-20260401-001": {"order_id": "ORD-20260401-001", "customer_id": "CUST-001", "items": [{"name": "SoundWave Pro", "quantity": 1, "price": 79.99}], "total": 79.99, "status": "delivered"}, "ORD-20260410-002": {"order_id": "ORD-20260410-002", "customer_id": "CUST-001", "items": [{"name": "Air Fryer", "quantity": 1, "price": 99.99}], "total": 99.99, "status": "shipped", "tracking": "1Z999AA10123456784"}}
          def handler(event, context):
              # Gateway passes only tool arguments as event
              # Infer: checkout has customer_id + optional payment_method (no order_id)
              # get_order_status has order_id only, list_orders has customer_id only,
              # request_return has order_id + reason
              if "reason" in event:
                  oid = event["order_id"]
                  if oid not in orders: return {"error": f"Order '{oid}' not found"}
                  if orders[oid]["status"] not in ("delivered", "shipped"): return {"error": f"Cannot return — status is {orders[oid]['status']}"}
                  rid = f"RET-{uuid.uuid4().hex[:8].upper()}"
                  orders[oid]["status"] = "return_requested"
                  return {"status": "return_requested", "return_id": rid, "reason": event.get("reason", "")}
              elif "order_id" in event:
                  oid = event["order_id"]
                  return orders.get(oid, {"error": f"Order '{oid}' not found"})
              elif "payment_method" in event or ("customer_id" in event and len(event) <= 2):
                  # checkout or list_orders — if payment_method present it's checkout
                  if "payment_method" in event:
                      oid = f"ORD-{datetime.now().strftime('%Y%m%d')}-{uuid.uuid4().hex[:6].upper()}"
                      orders[oid] = {"order_id": oid, "customer_id": event["customer_id"], "status": "confirmed", "payment": event.get("payment_method", "credit_card")}
                      return {"status": "confirmed", "order_id": oid, "delivery": "3-5 business days"}
                  else:
                      cid = event["customer_id"]
                      return {"orders": [o for o in orders.values() if o.get("customer_id") == cid]}
              else:
                  # Default: list orders if customer_id present
                  cid = event.get("customer_id", "")
                  if cid:
                      return {"orders": [o for o in orders.values() if o.get("customer_id") == cid]}
                  return {"error": "Missing required parameters"}
      Environment:
        Variables:
          ORDERS_TABLE: !Ref OrdersTable

  # ═══════════════════════════════════════════════════════════════════════════════
  # AGENTCORE GATEWAY — Managed MCP Endpoint
  # ═══════════════════════════════════════════════════════════════════════════════

  GatewayRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-GatewayRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock-agentcore.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambdaTools
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource:
                  - !GetAtt ProductsFunction.Arn
                  - !GetAtt CartFunction.Arn
                  - !GetAtt OrdersFunction.Arn

  ShopAssistGateway:
    Type: AWS::BedrockAgentCore::Gateway
    Properties:
      Name: !Sub ${AWS::StackName}-Gateway
      Description: "ShopAssist E-Commerce MCP Gateway — product search, cart, and order tools"
      AuthorizerType: NONE
      ProtocolType: MCP
      RoleArn: !GetAtt GatewayRole.Arn

  # Gateway Target — Products Lambda
  ProductsTarget:
    Type: AWS::BedrockAgentCore::GatewayTarget
    DependsOn: ShopAssistGateway
    Properties:
      GatewayIdentifier: !GetAtt ShopAssistGateway.GatewayIdentifier
      Name: ProductTools
      Description: "Product search, details, and recommendations"
      CredentialProviderConfigurations:
        - CredentialProviderType: GATEWAY_IAM_ROLE
      TargetConfiguration:
        Mcp:
          Lambda:
            LambdaArn: !GetAtt ProductsFunction.Arn
            ToolSchema:
              InlinePayload:
                - Name: search_products
                  Description: "Search the product catalog by keyword, category, and price range"
                  InputSchema:
                    Type: object
                    Properties:
                      query:
                        Type: string
                        Description: "Search keywords (e.g., wireless headphones)"
                      category:
                        Type: string
                        Description: "Filter by category: Electronics, Home & Kitchen, Sports & Outdoors, Books"
                      min_price:
                        Type: number
                        Description: "Minimum price in USD"
                      max_price:
                        Type: number
                        Description: "Maximum price in USD"
                - Name: get_product_details
                  Description: "Get detailed information about a specific product by ID"
                  InputSchema:
                    Type: object
                    Properties:
                      product_id:
                        Type: string
                        Description: "Product ID (e.g., ELEC-001)"
                    Required:
                      - product_id
                - Name: get_recommendations
                  Description: "Get top-rated product recommendations, optionally filtered by category"
                  InputSchema:
                    Type: object
                    Properties:
                      category:
                        Type: string
                        Description: "Optional category filter"
                      limit:
                        Type: integer
                        Description: "Number of recommendations (default 5)"

  # Gateway Target — Cart Lambda
  CartTarget:
    Type: AWS::BedrockAgentCore::GatewayTarget
    DependsOn: ShopAssistGateway
    Properties:
      GatewayIdentifier: !GetAtt ShopAssistGateway.GatewayIdentifier
      Name: CartTools
      Description: "Shopping cart operations and coupon management"
      CredentialProviderConfigurations:
        - CredentialProviderType: GATEWAY_IAM_ROLE
      TargetConfiguration:
        Mcp:
          Lambda:
            LambdaArn: !GetAtt CartFunction.Arn
            ToolSchema:
              InlinePayload:
                - Name: add_to_cart
                  Description: "Add a product to the customer's shopping cart"
                  InputSchema:
                    Type: object
                    Properties:
                      customer_id:
                        Type: string
                        Description: "Customer ID"
                      product_id:
                        Type: string
                        Description: "Product ID to add"
                      quantity:
                        Type: integer
                        Description: "Number of items (default 1)"
                    Required:
                      - customer_id
                      - product_id
                - Name: view_cart
                  Description: "View the contents of a customer's shopping cart"
                  InputSchema:
                    Type: object
                    Properties:
                      customer_id:
                        Type: string
                        Description: "Customer ID"
                    Required:
                      - customer_id
                - Name: remove_from_cart
                  Description: "Remove a product from the cart"
                  InputSchema:
                    Type: object
                    Properties:
                      customer_id:
                        Type: string
                        Description: "Customer ID"
                      product_id:
                        Type: string
                        Description: "Product ID to remove"
                    Required:
                      - customer_id
                      - product_id
                - Name: apply_coupon
                  Description: "Apply a discount coupon to the cart"
                  InputSchema:
                    Type: object
                    Properties:
                      customer_id:
                        Type: string
                        Description: "Customer ID"
                      coupon_code:
                        Type: string
                        Description: "Coupon code (WELCOME10, SAVE20, SPRING25, TECH15)"
                    Required:
                      - customer_id
                      - coupon_code

  # Gateway Target — Orders Lambda
  OrdersTarget:
    Type: AWS::BedrockAgentCore::GatewayTarget
    DependsOn: ShopAssistGateway
    Properties:
      GatewayIdentifier: !GetAtt ShopAssistGateway.GatewayIdentifier
      Name: OrderTools
      Description: "Order processing, status tracking, and returns"
      CredentialProviderConfigurations:
        - CredentialProviderType: GATEWAY_IAM_ROLE
      TargetConfiguration:
        Mcp:
          Lambda:
            LambdaArn: !GetAtt OrdersFunction.Arn
            ToolSchema:
              InlinePayload:
                - Name: checkout
                  Description: "Process checkout and place an order"
                  InputSchema:
                    Type: object
                    Properties:
                      customer_id:
                        Type: string
                        Description: "Customer ID"
                      payment_method:
                        Type: string
                        Description: "Payment method: credit_card, debit_card, paypal"
                    Required:
                      - customer_id
                - Name: get_order_status
                  Description: "Check the status of an existing order"
                  InputSchema:
                    Type: object
                    Properties:
                      order_id:
                        Type: string
                        Description: "Order ID (e.g., ORD-20260401-001)"
                    Required:
                      - order_id
                - Name: list_orders
                  Description: "List all orders for a customer"
                  InputSchema:
                    Type: object
                    Properties:
                      customer_id:
                        Type: string
                        Description: "Customer ID"
                    Required:
                      - customer_id
                - Name: request_return
                  Description: "Request a return/refund for a delivered order"
                  InputSchema:
                    Type: object
                    Properties:
                      order_id:
                        Type: string
                        Description: "Order ID to return"
                      reason:
                        Type: string
                        Description: "Reason: defective, wrong item, not as described, changed mind"
                    Required:
                      - order_id
                      - reason

  # ═══════════════════════════════════════════════════════════════════════════════
  # AGENTCORE RUNTIME — Serverless Agent Hosting (Default Mode)
  # ═══════════════════════════════════════════════════════════════════════════════

  AgentRuntimeRole:
    Type: AWS::IAM::Role
    Condition: DeployRuntime
    Properties:
      RoleName: !Sub ${AWS::StackName}-RuntimeRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock-agentcore.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockInvoke
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                  - bedrock:CreateResponse
                  - bedrock:*
                Resource: "*"
        - PolicyName: AgentCoreGatewayAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock-agentcore:InvokeGateway
                  - bedrock-agentcore:ListGatewayTools
                Resource: !GetAtt ShopAssistGateway.GatewayArn
        - PolicyName: S3CodeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub arn:aws:s3:::${AgentCodeS3Bucket}/${AgentCodeS3Key}
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"

  ShopAssistRuntime:
    Type: AWS::BedrockAgentCore::Runtime
    Condition: DeployRuntime
    DependsOn:
      - ShopAssistGateway
      - ProductsTarget
      - CartTarget
      - OrdersTarget
    Properties:
      AgentRuntimeName: ShopAssistAgentV6
      Description: "ShopAssist E-Commerce Agent — Server-Side Tool Execution via Responses API + AgentCore Gateway"
      AgentRuntimeArtifact:
        CodeConfiguration:
          Runtime: PYTHON_3_12
          EntryPoint:
            - main.py
          Code:
            S3:
              Bucket: !Ref AgentCodeS3Bucket
              Prefix: !Ref AgentCodeS3Key
      RoleArn: !GetAtt AgentRuntimeRole.Arn
      NetworkConfiguration:
        NetworkMode: PUBLIC
      ProtocolConfiguration: HTTP
      EnvironmentVariables:
        BEDROCK_MODEL_ID: !Ref ModelId
        GATEWAY_URL: !GetAtt ShopAssistGateway.GatewayUrl
        GATEWAY_ARN: !GetAtt ShopAssistGateway.GatewayArn
      Tags:
        Project: ShopAssist
        Framework: StrandsAgents

Outputs:
  # Gateway
  GatewayId:
    Description: AgentCore Gateway ID
    Value: !GetAtt ShopAssistGateway.GatewayIdentifier
  GatewayArn:
    Description: AgentCore Gateway ARN (use for server-side tool execution)
    Value: !GetAtt ShopAssistGateway.GatewayArn
  GatewayUrl:
    Description: AgentCore Gateway MCP URL (use for client-side MCP connection)
    Value: !GetAtt ShopAssistGateway.GatewayUrl

  # Runtime (only when AgentCodeS3Bucket is provided)
  RuntimeArn:
    Condition: DeployRuntime
    Description: AgentCore Runtime ARN
    Value: !GetAtt ShopAssistRuntime.AgentRuntimeArn
  RuntimeId:
    Condition: DeployRuntime
    Description: AgentCore Runtime ID
    Value: !GetAtt ShopAssistRuntime.AgentRuntimeId

  # Lambda ARNs
  ProductsFunctionArn:
    Value: !GetAtt ProductsFunction.Arn
  CartFunctionArn:
    Value: !GetAtt CartFunction.Arn
  OrdersFunctionArn:
    Value: !GetAtt OrdersFunction.Arn

  # Data
  ProductsTableName:
    Value: !Ref ProductsTable
  CartsTableName:
    Value: !Ref CartsTable
  OrdersTableName:
    Value: !Ref OrdersTable
